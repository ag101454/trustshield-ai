<!DOCTYPE html>
<html>
<head>
  <title>TrustShield Icon Generator</title>
  <style>
    body {
      background: #060606;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      padding: 40px;
      font-family: Arial, sans-serif;
      color: white;
    }
    canvas {
      border: 1px solid #333;
      border-radius: 12px;
    }
    .icon-row {
      display: flex;
      align-items: center;
      gap: 20px;
    }
    button {
      padding: 10px 24px;
      background: #10b981;
      color: #060606;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
      font-size: 14px;
    }
    button:hover {
      background: #34d399;
    }
    .size-label {
      color: #71717a;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <h2>🛡️ TrustShield AI - Icon Generator</h2>
  <p>Right-click each icon → Save image as → Put in extension/icons/ folder</p>

  <div class="icon-row">
    <div>
      <canvas id="icon16" width="16" height="16"></canvas>
      <p class="size-label">icon16.png</p>
    </div>
    <div>
      <canvas id="icon48" width="48" height="48"></canvas>
      <p class="size-label">icon48.png</p>
    </div>
    <div>
      <canvas id="icon128" width="128" height="128"></canvas>
      <p class="size-label">icon128.png</p>
    </div>
  </div>

  <button onclick="downloadAll()">📥 Download All Icons</button>

  <script>
    function drawShieldIcon(canvas, size) {
      const ctx = canvas.getContext('2d');
      
      // Background gradient
      const gradient = ctx.createLinearGradient(0, 0, size, size);
      gradient.addColorStop(0, '#10b981');
      gradient.addColorStop(1, '#059669');
      
      // Rounded rect background
      const radius = size * 0.2;
      ctx.beginPath();
      ctx.moveTo(radius, 0);
      ctx.lineTo(size - radius, 0);
      ctx.quadraticCurveTo(size, 0, size, radius);
      ctx.lineTo(size, size - radius);
      ctx.quadraticCurveTo(size, size, size - radius, size);
      ctx.lineTo(radius, size);
      ctx.quadraticCurveTo(0, size, 0, size - radius);
      ctx.lineTo(0, radius);
      ctx.quadraticCurveTo(0, 0, radius, 0);
      ctx.closePath();
      ctx.fillStyle = gradient;
      ctx.fill();
      
      // Shield shape (simplified)
      const cx = size / 2;
      const cy = size / 2;
      const shieldSize = size * 0.5;
      
      ctx.fillStyle = 'white';
      ctx.font = `bold ${shieldSize}px Arial`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('T', cx, cy + shieldSize * 0.05);
    }

    // Draw all icons
    drawShieldIcon(document.getElementById('icon16'), 16);
    drawShieldIcon(document.getElementById('icon48'), 48);
    drawShieldIcon(document.getElementById('icon128'), 128);

    function downloadAll() {
      const sizes = [16, 48, 128];
      sizes.forEach(size => {
        const canvas = document.getElementById('icon' + size);
        const link = document.createElement('a');
        link.download = 'icon' + size + '.png';
        link.href = canvas.toDataURL('image/png');
        link.click();
      });
      alert('Icons downloaded! Move them to: extension/icons/ folder');
    }
  </script>
</body>
</html>
